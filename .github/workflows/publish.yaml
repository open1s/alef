name: Publish

on:
  push:
    tags:
      - v[0-9]+.*
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g., v0.1.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  meta:
    name: Resolve versions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      crates_exists: ${{ steps.published.outputs.crates_exists }}
      release_assets_exist: ${{ steps.release_assets.outputs.release_assets_exist }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#v}"
          {
            echo "version=$version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"
          echo "Git tag: $tag"
          echo "Version: $version"

      - name: Detect already-published versions
        id: published
        run: |
          version="${{ steps.version.outputs.version }}"
          crates_exists=false
          if curl -fsS "https://crates.io/api/v1/crates/alef-cli/${version}" >/dev/null; then
            crates_exists=true
          fi
          echo "crates_exists=$crates_exists" >> "$GITHUB_OUTPUT"
          echo "crates.io published: $crates_exists"

      - name: Detect existing GitHub release assets
        id: release_assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          release_assets_exist=false
          if gh release view "$tag" >/dev/null 2>&1; then
            count="$(gh release view "$tag" --json assets --jq '.assets | length')"
            if [ "${count:-0}" -gt 0 ]; then
              release_assets_exist=true
            fi
          fi
          echo "release_assets_exist=$release_assets_exist" >> "$GITHUB_OUTPUT"
          echo "GitHub release assets exist: $release_assets_exist"

  release_assets:
    name: Publish GitHub release assets
    needs: meta
    if: needs.meta.outputs.release_assets_exist != 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,aarch64-apple-darwin,x86_64-pc-windows-gnu

      - name: Install Zig
        run: brew install zig mingw-w64

      - name: Build and publish GitHub release assets
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}

  publish_crates:
    name: Publish crates.io
    needs: meta
    if: needs.meta.outputs.crates_exists != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: crates_auth

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_auth.outputs.token }}
        run: |
          set -euo pipefail

          publish_crate() {
            local crate="$1"
            echo "Publishing $crate..."
            if cargo publish -p "$crate" --allow-dirty 2>cargo-publish.err; then
              echo "$crate published successfully"
              return 0
            fi
            if grep -Eq "crate .* already exists" cargo-publish.err; then
              echo "$crate already published; skipping"
              return 0
            fi
            cat cargo-publish.err >&2
            return 1
          }

          # Publish in dependency order with delays for crates.io index propagation
          publish_crate alef-core
          sleep 30

          publish_crate alef-extract
          sleep 30

          publish_crate alef-codegen
          sleep 30

          publish_crate alef-adapters
          sleep 30

          publish_crate alef-docs
          sleep 30

          publish_crate alef-e2e
          sleep 30

          publish_crate alef-readme
          sleep 30

          publish_crate alef-scaffold
          sleep 30

          # Backends (all depend on alef-core + alef-codegen + alef-adapters)
          for backend in pyo3 napi wasm ffi magnus php rustler extendr go java csharp; do
            publish_crate "alef-backend-${backend}"
            sleep 15
          done

          sleep 30
          publish_crate alef-cli
