$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
description: Polyglot binding generator that produces type-safe language bindings for Rust libraries (Python/TypeScript/Ruby/Java/Go/Elixir/C#/PHP/R/WASM)
gitignore: true
name: Alef

# Include shared ai-rulez configuration from git repository
includes:
  - name: kreuzberg-core
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/core
    local_override: ../ai-rulez
    merge_strategy: local-override
  - name: kreuzberg-languages
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/languages
    local_override: ../ai-rulez
    merge_strategy: local-override
  - name: kreuzberg-cicd
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/cicd
    local_override: ../ai-rulez
    merge_strategy: local-override
  - name: kreuzberg-e2e-generator
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/e2e-generator
    local_override: ../ai-rulez
    merge_strategy: local-override

builtins:
  - rust
  - python
  - typescript
  - go
  - java
  - ruby
  - php
  - csharp
  - elixir
  - r
  - security
  - git-workflow
  - code-quality
  - testing
  - token-efficiency
  - default-commands

presets:
  - claude
compression:
  level: moderate
version: "3.0"
